name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    concurrency: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Coolify (Staging)
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_STAGING }}" \
            -H "Content-Type: application/json" \
            -d '{"imageTag": "staging-${{ github.sha }}"}'

      - name: Wait for health check
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.STAGING_URL }}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS"
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Run smoke tests
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.STAGING_URL }}" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed"

  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    concurrency: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run database migrations
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_MIGRATIONS }}" \
            -H "Content-Type: application/json" \
            -d '{"migration": "latest"}'

      - name: Deploy to Coolify (Production)
        run: |
          curl -X POST "${{ secrets.COOLIFY_WEBHOOK_PRODUCTION }}" \
            -H "Content-Type: application/json" \
            -d '{"imageTag": "production-${{ github.sha }}"}'

      - name: Wait for health check
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ secrets.PRODUCTION_URL }}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS"
            sleep 10
          done
          echo "Health check failed after 60 attempts"
          exit 1

      - name: Run smoke tests
        run: |
          for endpoint in "/" "/forums" "/api/health"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ secrets.PRODUCTION_URL }}$endpoint" || echo "000")
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
              echo "Smoke test failed for $endpoint: HTTP $STATUS"
              exit 1
            fi
            echo "Smoke test passed for $endpoint"
          done

      - name: Verify Sentry health
        run: |
          curl -s "https://${{ secrets.PRODUCTION_URL }}/api/health" | jq '.checks.sentry' || true

      - name: Notify success
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "Production deployment successful: ${{ github.sha }}"}'

  rollback:
    name: Rollback
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Rollback Coolify deployment
        run: |
          curl -X POST "${{ secrets.COOLIFY_ROLLBACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"rollback": true}'
      
      - name: Wait for health check
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ secrets.PRODUCTION_URL }}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Rollback health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Rollback health check failed"
          exit 1

  backup:
    name: Database Backup
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    schedule:
      - cron: "0 */6 * * *"
    steps:
      - name: Run pg_dump
        run: |
          pg_dump "${{ secrets.DATABASE_URL }}" \
            --format=custom \
            --file=backup.dump \
            --verbose \
            --no-owner
      - name: Upload to R2
        run: |
          aws s3 cp backup.dump "s3://${{ secrets.R2_BUCKET_NAME }}/backups/database/$(date +%Y%m%d_%H%M%S).dump" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
